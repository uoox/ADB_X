name: Build & Sync

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  debug:
    name: Debug build
    runs-on: ubuntu-latest
    if: "!startsWith(github.ref, 'refs/tags/v')"
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: microsoft
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - run: chmod +x gradlew && ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk

  release:
    name: Release + Full mirror to Xposed repo
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history and every tag so the changelog step can
          # diff against the previous v* tag.
          fetch-depth: 0
          fetch-tags: true
      - uses: actions/setup-java@v4
        with:
          distribution: microsoft
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4

      - name: Setup keystore
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > adb_x.jks
            printf "storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=adb_x.jks\n" \
              "${{ secrets.STOREPASSWORD }}" \
              "${{ secrets.KEYPASSWORD }}" \
              "${{ secrets.KEYALIAS }}" > keystore.properties
          else
            keytool -genkey -v -keystore adb_x.jks -alias adb_x -keyalg RSA \
              -keysize 2048 -validity 1 -storepass temp_pass -keypass temp_pass \
              -dname "CN=CI, OU=ADB_X, O=ADB_X, L=Unknown, ST=Unknown, C=CN"
            printf "storePassword=temp_pass\nkeyPassword=temp_pass\nkeyAlias=adb_x\nstoreFile=adb_x.jks\n" > keystore.properties
          fi

      - name: Build release APK
        run: chmod +x gradlew && ./gradlew assembleRelease

      - name: Extract version info
        id: apk
        run: |
          AAPT=$(ls $ANDROID_SDK_ROOT/build-tools/**/aapt2 | tail -1)
          BADGING=$($AAPT dump badging app/build/outputs/apk/release/app-release.apk | head -1)
          VERCODE=$(echo "$BADGING" | sed -n "s/^package:.*versionCode='\([0-9]*\)'.*/\1/p")
          VERNAME=$(echo "$BADGING" | sed -n "s/^package:.*versionName='\([^']*\)'.*/\1/p")
          # VersionCode must change every release — immutable-release tag
          # protection blocks reusing a tag. We append the CI run number to
          # the manifest versionCode so the LSPosed tag stays unique.
          VERCODE="${VERCODE}${GITHUB_RUN_NUMBER}"
          echo "versionCode=$VERCODE" >> "$GITHUB_OUTPUT"
          echo "versionName=$VERNAME" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ADB_X v${{ steps.apk.outputs.versionName }}
          body: |
            ## ADB_X v${{ steps.apk.outputs.versionName }}
            Xposed module - wireless ADB enhancement.
          files: app/build/outputs/apk/release/app-release.apk
          draft: false
          prerelease: false

      - name: Mirror full source to Xposed repo
        # Only runs where the Xposed-Modules-Repo push token is configured
        # (the upstream repo). Forks without the secret skip the mirror and
        # still publish a normal GitHub Release above.
        if: ${{ secrets.XPOSED_TOKEN != '' }}
        env:
          VC: ${{ steps.apk.outputs.versionCode }}
          VN: ${{ steps.apk.outputs.versionName }}
        run: |
          git clone --branch main \
            https://x-access-token:${{ secrets.XPOSED_TOKEN }}@github.com/Xposed-Modules-Repo/top.cbug.adbx.git \
            xposed_mirror
          cd xposed_mirror
          # Drop everything except .git so rsync below is a clean mirror.
          # -not -path './.git' excludes the .git directory itself;
          # -not -path './.git/*' excludes its contents. Without both,
          # `find -delete` errors with "cannot delete '.git': Directory
          # not empty" under `set -e`.
          find . -mindepth 1 \
            -not -path './.git' -not -path './.git/*' -delete
          cd ..
          rsync -a --exclude='.git' --exclude='app/build' --exclude='.gradle' \
            --exclude='.xposed_repo' --exclude='adb_x.jks' --exclude='adb_x.b64.txt' \
            --exclude='keystore.properties' --exclude='local.properties' \
            --exclude='*.db' --exclude='*.bak' --exclude='build_log.txt' \
            --exclude='*.jar' ./ ./xposed_mirror/
          cd xposed_mirror
          cat > module.prop << PROPEOF
          #
          # ADB_X - Xposed module for wireless ADB enhancement
          # https://github.com/blockman3063/ADB_X
          #
          name=ADB_X
          package=top.cbug.adbx
          author=blockman3063
          description=ADB_X - 无线ADB调试增强 Xposed 模块。固定端口、配对码捕获、信任WiFi自动开启无线ADB。
          version=$VN
          versionCode=$VC
          minSdk=30
          maxSdk=36
          PROPEOF
          echo "- Release v$VN" >> changelog.txt

      - name: Push mirror to Xposed repo
        if: ${{ secrets.XPOSED_TOKEN != '' }}
        run: |
          cd xposed_mirror
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit --allow-empty -m "Sync v${{ steps.apk.outputs.versionName }} from blockman3063/ADB_X"
          git push origin main

      - name: Build changelog since last release
        id: changelog
        env:
          CURRENT_TAG: ${{ github.ref_name }}
        run: |
          # Find the previous v* tag (the most recent one before the one that
          # just triggered this workflow). List commits between it and HEAD,
          # formatted as a markdown bullet list for the release notes body.
          PREV_TAG=$(git tag --sort=-creatordate \
            | grep -E '^v[0-9]' \
            | grep -v "^${CURRENT_TAG}$" \
            | head -1 || true)
          if [ -z "$PREV_TAG" ]; then
            # First release — list the last 20 commits on main instead.
            NOTES=$(git log --oneline -20 | sed 's/^/- /')
            echo "First release — showing last 20 commits" >> "$GITHUB_STEP_SUMMARY"
          else
            NOTES=$(git log "${PREV_TAG}..HEAD" --oneline | sed 's/^/- /')
            echo "Commits since ${PREV_TAG}:" >> "$GITHUB_STEP_SUMMARY"
            git log "${PREV_TAG}..HEAD" --oneline >> "$GITHUB_STEP_SUMMARY"
          fi
          # Persist NOTES to a file. Step outputs/env can't carry multi-line
          # values in classic Actions, so we write to disk and the next step
          # reads it back via a relative path.
          printf '%s' "$NOTES" > changelog.txt
          echo "wrote $(wc -l < changelog.txt) lines to changelog.txt" >> "$GITHUB_STEP_SUMMARY"

      - name: Create GitHub Release on Xposed repo
        if: ${{ secrets.XPOSED_TOKEN != '' }}
        env:
          GH_TOKEN: ${{ secrets.XPOSED_TOKEN }}
          VC: ${{ steps.apk.outputs.versionCode }}
          VN: ${{ steps.apk.outputs.versionName }}
        run: |
          # Tag must match LSPosed repo indexer regex /^\d+-.+$/ — leading
          # digits, then a dash, then anything. versionCode is a pure int;
          # versionName may contain dots. This avoids the immutable-release
          # tag-reuse block and keeps modules.lsposed.org indexing the build.
          TAG_NAME="$VC-$VN"

          # Build the release notes body, then POST as JSON via a python
          # heredoc so we don't fight with bash/awk string escaping for
          # embedded newlines, quotes, or backslashes in commit messages.
          PAYLOAD=$(python3 <<PYEOF
          import json
          with open('changelog.txt') as f:
              notes = f.read()
          body = "ADB_X v$VN - wireless ADB enhancement Xposed module.\n\n## Changes since previous release\n\n" + notes + "\n\nSource: https://github.com/blockman3063/ADB_X"
          payload = {
              "tag_name":   "$TAG_NAME",
              "name":       "ADB_X $TAG_NAME",
              "body":       body,
              "draft":      True,
              "prerelease": False,
          }
          import sys
          sys.stdout.write(json.dumps(payload))
          PYEOF)

          # Create as DRAFT first so we can upload asset before lock
          DRAFT_RESPONSE=$(curl -s -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/Xposed-Modules-Repo/top.cbug.adbx/releases" \
            -d "$PAYLOAD")
          RELEASE_ID=$(echo "$DRAFT_RESPONSE" | grep -m1 '"id":' | head -1 | sed 's/[^0-9]//g')

          if [ -z "$RELEASE_ID" ]; then
            echo "ERROR: failed to create draft release"
            echo "$DRAFT_RESPONSE"
            exit 1
          fi

          echo "Draft release $TAG_NAME created with id $RELEASE_ID"

          # Upload asset (draft releases are not immutable).
          # The release APK was built earlier in app/build/outputs/apk/release/
          # by the 'Build release APK' step. We upload it with a flat name
          # so the URL is stable across builds with the same versionName.
          cp "app/build/outputs/apk/release/app-release.apk" "./adb_x_v$VN.apk"
          UPLOAD_RESULT=$(curl -s -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/vnd.android.package-archive" \
            "https://uploads.github.com/repos/Xposed-Modules-Repo/top.cbug.adbx/releases/$RELEASE_ID/assets?name=adb_x_v$VN.apk" \
            --data-binary @./adb_x_v$VN.apk)
          echo "Upload: $UPLOAD_RESULT"

          # Now publish the draft
          curl -s -X PATCH \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/Xposed-Modules-Repo/top.cbug.adbx/releases/$RELEASE_ID" \
            -d '{"draft":false}'

          echo "✅ Published release $TAG_NAME with APK adb_x_v$VN.apk"

