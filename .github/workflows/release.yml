name: Build & Sync

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  debug:
    name: Debug build
    runs-on: ubuntu-latest
    if: "!startsWith(github.ref, 'refs/tags/v')"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: microsoft
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - run: chmod +x gradlew && ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk

  release:
    name: Release + Full mirror to Xposed repo
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: microsoft
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4

      - name: Setup keystore
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > adb_x.jks
            echo "storePassword=${{ secrets.STOREPASSWORD }}" > keystore.properties
            echo "keyPassword=${{ secrets.KEYPASSWORD }}" >> keystore.properties
            echo "keyAlias=${{ secrets.KEYALIAS }}" >> keystore.properties
            echo "storeFile=adb_x.jks" >> keystore.properties
          else
            keytool -genkey -v -keystore adb_x.jks -alias adb_x -keyalg RSA -keysize 2048 -validity 1 -storepass temp_pass -keypass temp_pass -dname "CN=CI,O=ADB_X,L=Unknown,ST=Unknown,C=CN"
            echo "storePassword=temp_pass" > keystore.properties
            echo "keyPassword=temp_pass" >> keystore.properties
            echo "keyAlias=adb_x" >> keystore.properties
            echo "storeFile=adb_x.jks" >> keystore.properties
          fi

      - name: Build release APK
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease
          cp app/build/outputs/apk/release/app-release.apk ADB_X-release.apk

      - name: Extract version info
        id: apk
        run: |
          AAPT=$(ls $ANDROID_SDK_ROOT/build-tools/**/aapt2 2>/dev/null | tail -1 || echo /usr/local/lib/android/sdk/build-tools/36.0.0/aapt2)
          BADGING=$($AAPT dump badging app/build/outputs/apk/release/app-release.apk | head -1)
          VERCODE=$(echo "$BADGING" | sed -n "s/^package:.*versionCode='\([0-9]*\)'.*/\1/p")
          VERNAME=$(echo "$BADGING" | sed -n "s/^package:.*versionName='\([^']*\)'.*/\1/p")
          echo "versionCode=$VERCODE" >> "$GITHUB_OUTPUT"
          echo "versionName=$VERNAME" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ADB_X v${{ steps.apk.outputs.versionName }}
          body: |
            ## ADB_X v${{ steps.apk.outputs.versionName }}
            Xposed module — wireless ADB enhancement.
          files: ADB_X-release.apk
          draft: false
          prerelease: false

      # ---- Full source mirror to Xposed-Modules-Repo (requires XPOSED_TOKEN secret) ----
      - name: Mirror full source to Xposed repo
        if: env.XPOSED_TOKEN != ''
        env:
          VC: ${{ steps.apk.outputs.versionCode }}
          VN: ${{ steps.apk.outputs.versionName }}
          XPOSED_TOKEN: ${{ secrets.XPOSED_TOKEN }}
        run: |
          # Clone Xposed repo
          git clone --branch main \
            https://x-access-token:${XPOSED_TOKEN}@github.com/Xposed-Modules-Repo/top.cbug.adbx.git \
            xposed_mirror

          cd xposed_mirror
          # Remove everything except .git (preserve git history)
          find . -path ./.git -prune -o -mindepth 1 -delete
          cd ..

          # Copy all source from main repo (exclude build artifacts)
          rsync -a --exclude='.git' --exclude='app/build' --exclude='.gradle' \
            --exclude='.xposed_repo' --exclude='adb_x.jks' --exclude='adb_x.b64.txt' \
            --exclude='keystore.properties' --exclude='local.properties' \
            --exclude='*.db' --exclude='*.bak' --exclude='build_log.txt' \
            --exclude='*.jar' ./ ./xposed_mirror/

          cd xposed_mirror
          # Add module.prop (metadata for modules.lsposed.org)
          cat > module.prop << PROPEOF
          #
          # ADB_X - Xposed module for wireless ADB enhancement
          # https://github.com/blockman3063/ADB_X
          #
          name=ADB_X
          package=top.cbug.adbx
          author=blockman3063
          description=无线ADB调试增强模块: 固定端口，配对码，信任WiFi自动开启
          version=$VN
          versionCode=$VC
          minSdk=30
          maxSdk=36
          PROPEOF

          # Changelog
          echo "- Release v$VN" >> changelog.txt

      - name: Push mirror + tag to Xposed repo
        if: env.XPOSED_TOKEN != ''
        env:
          VC: ${{ steps.apk.outputs.versionCode }}
          VN: ${{ steps.apk.outputs.versionName }}
          XPOSED_TOKEN: ${{ secrets.XPOSED_TOKEN }}
        run: |
          cd xposed_mirror
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit --allow-empty -m "Sync v$VN from blockman3063/ADB_X"

          # Push source
          git push origin main

          # Tag the Xposed repo so modules.lsposed.org picks up the release
          TAG="$VC-$VN"
          git tag "$TAG" -m "v$VN" -f
          git push origin "$TAG" -f
