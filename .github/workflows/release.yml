name: Build & Sync

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  debug:
    name: Debug build
    runs-on: ubuntu-latest
    if: "!startsWith(github.ref, 'refs/tags/v')"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: microsoft
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk

  release:
    name: Release + Full mirror to Xposed repo
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: microsoft
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4

      - name: Setup keystore
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > adb_x.jks
            cat > keystore.properties <<EOF
            storePassword=${{ secrets.STOREPASSWORD }}
            keyPassword=${{ secrets.KEYPASSWORD }}
            keyAlias=${{ secrets.KEYALIAS }}
            storeFile=adb_x.jks
            EOF
          else
            keytool -genkey -v -keystore adb_x.jks -alias adb_x -keyalg RSA \
              -keysize 2048 -validity 1 -storepass temp_pass -keypass temp_pass \
              -dname "CN=CI, OU=ADB_X, O=ADB_X, L=Unknown, ST=Unknown, C=CN"
            cat > keystore.properties <<EOF
            storePassword=temp_pass
            keyPassword=temp_pass
            keyAlias=adb_x
            storeFile=adb_x.jks
            EOF
          fi

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Extract version info
        id: apk
        run: |
          AAPT=$(ls $ANDROID_SDK_ROOT/build-tools/**/aapt2 | tail -1)
          BADGING=$($AAPT dump badging app/build/outputs/apk/release/app-release.apk | head -1)
          VERCODE=$(echo "$BADGING" | sed -n "s/^package:.*versionCode='\([0-9]*\)'.*/\1/p")
          VERNAME=$(echo "$BADGING" | sed -n "s/^package:.*versionName='\([^']*\)'.*/\1/p")
          echo "versionCode=$VERCODE" >> "$GITHUB_OUTPUT"
          echo "versionName=$VERNAME" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ADB_X v${{ steps.apk.outputs.versionName }}
          body: |
            ## ADB_X v${{ steps.apk.outputs.versionName }}
            Xposed module - wireless ADB enhancement.
          files: app/build/outputs/apk/release/app-release.apk
          draft: false
          prerelease: false

      - name: Mirror full source to Xposed repo
        env:
          VC: ${{ steps.apk.outputs.versionCode }}
          VN: ${{ steps.apk.outputs.versionName }}
        run: |
          git clone --branch main \
            https://x-access-token:${{ secrets.XPOSED_TOKEN }}@github.com/Xposed-Modules-Repo/top.cbug.adbx.git \
            xposed_mirror
          cd xposed_mirror
          find . -mindepth 1 -not -path './.git/*' -delete
          cd ..
          rsync -a --exclude='.git' --exclude='app/build' --exclude='.gradle' \
            --exclude='.xposed_repo' --exclude='adb_x.jks' --exclude='adb_x.b64.txt' \
            --exclude='keystore.properties' --exclude='local.properties' \
            --exclude='*.db' --exclude='*.bak' --exclude='build_log.txt' \
            --exclude='*.jar' ./ ./xposed_mirror/
          cd xposed_mirror
          cat > module.prop << PROPEOF
          #
          # ADB_X - Xposed module for wireless ADB enhancement
          # https://github.com/blockman3063/ADB_X
          #
          name=ADB_X
          package=top.cbug.adbx
          author=blockman3063
          description=无线ADB调试增强模块: 固定端口，配对码，信任WiFi自动开启
          version=$VN
          versionCode=$VC
          minSdk=30
          maxSdk=36
          PROPEOF
          mkdir -p $VC
          cp ../app/build/outputs/apk/release/app-release.apk $VC/top.cbug.adbx_$VC.apk
          echo "- Release v$VN" >> changelog.txt

      - name: Push mirror to Xposed repo
        run: |
          cd xposed_mirror
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit --allow-empty -m "Sync v${{ steps.apk.outputs.versionName }} from blockman3063/ADB_X"
          git push origin main

      - name: Create GitHub Release on Xposed repo
        env:
          GH_TOKEN: ${{ secrets.XPOSED_TOKEN }}
          VC: ${{ steps.apk.outputs.versionCode }}
          VN: ${{ steps.apk.outputs.versionName }}
        run: |
          cp xposed_mirror/$VC/top.cbug.adbx_$VC.apk ./adb_x_v$VN.apk
          TAG_NAME="v$VN"
          curl -s -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/Xposed-Modules-Repo/top.cbug.adbx/releases" \
            -d "{\"tag_name\":\"$TAG_NAME\",\"name\":\"ADB_X $TAG_NAME\",\"body\":\"ADB_X v$VN - wireless ADB enhancement Xposed module.\n\nSource: https://github.com/blockman3063/ADB_X\",\"draft\":false,\"prerelease\":false}"
          RELEASE_ID=$(curl -s -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/Xposed-Modules-Repo/top.cbug.adbx/releases/tags/$TAG_NAME" \
            | grep -m1 '"id":' | head -1 | sed 's/[^0-9]//g')
          if [ -n "$RELEASE_ID" ]; then
            curl -s -X POST \
              -H "Authorization: token $GH_TOKEN" \
              -H "Content-Type: application/vnd.android.package-archive" \
              "https://uploads.github.com/repos/Xposed-Modules-Repo/top.cbug.adbx/releases/$RELEASE_ID/assets?name=adb_x_v$VN.apk" \
              --data-binary @./adb_x_v$VN.apk
            echo "APK uploaded to Xposed repo release v$VN"
          else
            echo "ERROR: could not get release ID"
            exit 1
          fi

