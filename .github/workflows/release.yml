name: Build & Sync

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  debug:
    name: Debug build
    runs-on: ubuntu-latest
    if: "!startsWith(github.ref, 'refs/tags/v')"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: microsoft
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk

  release:
    name: Release + Sync to Xposed repo
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: microsoft
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4

      # Build signed APK (use secrets if available, otherwise generate CI key)
      - name: Setup keystore
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > adb_x.jks
            cat > keystore.properties <<EOF
            storePassword=${{ secrets.STOREPASSWORD }}
            keyPassword=${{ secrets.KEYPASSWORD }}
            keyAlias=${{ secrets.KEYALIAS }}
            storeFile=adb_x.jks
            EOF
            echo "Using configured keystore"
          else
            # Generate temporary keystore for CI
            keytool -genkey -v -keystore adb_x.jks -alias adb_x -keyalg RSA \
              -keysize 2048 -validity 1 -storepass temp_pass -keypass temp_pass \
              -dname "CN=CI, OU=ADB_X, O=ADB_X, L=Unknown, ST=Unknown, C=CN"
            cat > keystore.properties <<EOF
            storePassword=temp_pass
            keyPassword=temp_pass
            keyAlias=adb_x
            storeFile=adb_x.jks
            EOF
            echo "Using temporary CI keystore"
          fi

      - name: Build release APK
        run: ./gradlew assembleRelease

      # Extract version info from APK
      - name: Extract version info
        id: apk
        run: |
          AAPT=$(ls $ANDROID_SDK_ROOT/build-tools/**/aapt2 | tail -1)
          BADGING=$($AAPT dump badging app/build/outputs/apk/release/app-release.apk | head -1)
          VERCODE=$(echo "$BADGING" | sed -n "s/^package:.*versionCode='\([0-9]*\)'.*/\1/p")
          VERNAME=$(echo "$BADGING" | sed -n "s/^package:.*versionName='\([^']*\)'.*/\1/p")
          echo "versionCode=$VERCODE" >> "$GITHUB_OUTPUT"
          echo "versionName=$VERNAME" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ADB_X v${{ steps.apk.outputs.versionName }}
          body: |
            ## ADB_X v${{ steps.apk.outputs.versionName }}

            Xposed module — wireless ADB enhancement.

            ### Features
            - Fixed ADB port
            - Pairing code capture & display
            - Trusted WiFi auto-enable (system_server hook)
            - Connection watchdog
            - Material 3 UI
          files: app/build/outputs/apk/release/app-release.apk
          draft: false
          prerelease: false

      # ---- Sync to Xposed Module Repository ----
      - name: Checkout Xposed repo
        uses: actions/checkout@v4
        with:
          repository: Xposed-Modules-Repo/top.cbug.adbx
          token: ${{ secrets.XPOSED_TOKEN }}
          path: xposed_repo

      - name: Sync APK + metadata to Xposed repo
        run: |
          VC=${{ steps.apk.outputs.versionCode }}
          VN=${{ steps.apk.outputs.versionName }}

          # APK in version-code directory
          mkdir -p xposed_repo/$VC
          cp app/build/outputs/apk/release/app-release.apk \
             xposed_repo/$VC/top.cbug.adbx_$VC.apk

          # module.prop (update version info)
          cat > xposed_repo/module.prop << PROPEOF
          #
          # ADB_X - Xposed module for wireless ADB enhancement
          # https://github.com/blockman3063/ADB_X
          #
          name=ADB_X
          package=top.cbug.adbx
          author=blockman3063
          description=无线ADB调试增强模块: 固定端口，配对码，信任WiFi自动开启
          version=$VN
          versionCode=$VC
          minSdk=30
          maxSdk=36
          PROPEOF

          # changelog (append)
          echo "- Release v$VN" >> xposed_repo/changelog.txt

          # Commit & push
          cd xposed_repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Sync v$VN from blockman3063/ADB_X"
          git push
